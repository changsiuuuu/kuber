---
# Source: micro-app/templates/deploy.yaml
# deploy.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: micro-app-deployment
  labels:
    environment: "PRODUCTION"
spec:
  # [if/else 예제] 운영 환경(production)이면 레플리카를 values 값대로 쓰고, 아니면 무조건 1로 고정
  replicas: 3
  selector:
    matchLabels:
      app: micro-app
  template:
    metadata:
      labels:
        app: micro-app
      # [if 예제] monitoring.enabled 가 true 일 때만 annotations 블록을 동적으로 생성
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
    spec:
      containers:
      - name: web-container
        image: "nginx:1.25.1"
        ports:
        - containerPort: 80
