# templates/ingress-rule.yaml
{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  # 배포시의 이름을 .Release.Name으로 참조할수있다
  name: "{{ .Release.Name }}-ingress"
spec:
  ingressClassName: aaa 
  rules:
    - host: aaa.com
      http:
        paths:
          {{- range .Values.ingress.paths }}

          {{- end}}
{{- end -}}